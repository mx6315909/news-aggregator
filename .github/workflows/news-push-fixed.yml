- name: Send notification to WhatsApp
  run: |
    curl -X POST "https://gh.mxaly.top:16666/api/message" \
      -H "Content-Type: application/json" \
      -d '{
        "channel": "whatsapp",
        "target": "+8613963767577",
        "message": "🚀 GitHub 代码更新通知\n\n📦 仓库: ${{ github.repository }}\n👤 提交者: ${{ github.actor }}\n📝 提交信息: ${{ github.event.head_commit.message }}\n⏰ 时间: ${{ github.event.head_commit.timestamp }}\n\n🤓 来自你的小弟"
      }'
