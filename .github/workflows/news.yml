name: News Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Send notification to WhatsApp
      run: |
        MESSAGE="🚀 GitHub 代码更新通知%0A%0A📦 仓库: ${{ github.repository }}%0A👤 提交者: ${{ github.actor }}%0A📝 提交信息: ${{ github.event.head_commit.message }}%0A⏰ 时间: ${{ github.event.head_commit.timestamp }}%0A%0A🤓 来自你的小弟"
        
        curl -X POST "https://gh.mxaly.top:16666/api/message" \
          -H "Content-Type: application/json" \
          -d "{\"channel\": \"whatsapp\", \"target\": \"+8613963767577\", \"message\": \"$MESSAGE\"}"
