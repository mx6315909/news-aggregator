name: News Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Send webhook to server
      run: |
        curl -X POST "http://xd.mxaly.top:16666/github-webhook" \
          -H "Content-Type: application/json" \
          -d '{
            "event": "github_push",
            "actor": "${{ github.actor }}",
            "message": "${{ github.event.head_commit.message }}"
          }' || echo "Webhook sent"
