name: News Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        
      - name: Send to WhatsApp
        run: |
          # 提取变量
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          MSG="${{ github.event.head_commit.message }}"
          
          # 使用 jq 构建标准的 JSON
          JSON=$(jq -n \
            --arg ch "whatsapp" \
            --arg tg "+8613963767577" \
            --arg msg "🚀 GitHub更新
          仓库: $REPO
          提交者: $ACTOR
          信息: $MSG
          🤓来自你的小弟" \
            '{channel: $ch, target: $tg, message: $msg}')
          
          echo "Sending payload..."
          
          # 加上了 -H "Authorization: Bearer ..." 这一行
          curl -X POST "https://gh.mxaly.top:16666/github-webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_TOKEN }}" \
            -d "$JSON"
