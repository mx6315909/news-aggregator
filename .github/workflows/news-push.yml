name: News Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        
      - name: Send to WhatsApp
        run: |
          # 提取变量
          REPO="${{ github.repository }}"
          MSG=$(echo "${{ github.event.head_commit.message }}" | tr -d '"' | tr -d "'")
          
          # 【核心修改】构造符合 OpenClaw 校验的 GitHub Webhook 格式
          JSON=$(jq -n \
            --arg repo "$REPO" \
            --arg msg "🚀 GitHub更新\n仓库: $REPO\n信息: $MSG\n🤓来自你的小弟" \
            '{
              repository: { full_name: $repo },
              head_commit: { message: $msg },
              pusher: { name: "GitHub Action" }
            }')
          
          echo "Sending payload to OpenClaw via Lucky (18080)..."
          
          # 【路径修改】使用实测 200 OK 的路径
          # 【Header修改】增加 X-GitHub-Event 伪装身份证
          curl -X POST "https://gh.mxaly.top:16666/github-webhook" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_TOKEN }}" \
            -d "$JSON"
