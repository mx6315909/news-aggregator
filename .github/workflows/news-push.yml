name: News Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        
      - name: Send to WhatsApp
        run: |
          # 1. 提取变量并清理掉可能导致 JSON 格式损坏的字符
          REPO="${{ github.repository }}"
          # 清除提交信息中的换行和特殊引号，确保字符串安全
          MSG=$(echo "${{ github.event.head_commit.message }}" | tr -d '\n' | tr -d '"' | tr -d "'")
          
          # 2. 构造 OpenClaw /hooks/agent 要求的直接指令包
          # 确保字段名称与文档提供的 "deliver", "channel", "to" 一致
          JSON=$(jq -n \
            --arg msg "🚀 GitHub更新
          仓库: $REPO
          信息: $MSG
          🤓来自你的小弟" \
            --arg to "+8613963767577" \
            '{
              message: $msg,
              name: "GitHub推送",
              deliver: true,
              channel: "whatsapp",
              to: $to
            }')
          
          echo "Sending command to OpenClaw via /hooks/agent..."
          
          # 3. 发送 POST 请求
          # 此时不再需要 X-GitHub-Event，因为它不再是伪装 Webhook，而是直接 API 调用
          curl -X POST "https://gh.mxaly.top:16666/hooks/agent" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_TOKEN }}" \
            -d "$JSON"
