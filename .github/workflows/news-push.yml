name: News Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        
      - name: Send to WhatsApp
        run: |
          # 提取变量
          REPO="${{ github.repository }}"
          MSG=$(echo "${{ github.event.head_commit.message }}" | tr -d '"' | tr -d "'")
          
          # 【核心修改】按照文档要求构造 JSON 指令包
          # 必须包含 message, deliver, channel, to 字段
          JSON=$(jq -n \
            --arg msg "🚀 GitHub更新
          仓库: $REPO
          信息: $MSG
          🤓来自你的小弟" \
            --arg to "+8613963767577" \
            '{
              message: $msg,
              name: "GitHub推送",
              deliver: true,
              channel: "whatsapp",
              to: $to
            }')
          
          echo "Sending Targeted Command to OpenClaw Agent..."
          
          # 使用 /hooks/agent 路径，不再需要 X-GitHub-Event 伪装头
          curl -X POST "https://gh.mxaly.top:16666/hooks/agent" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_TOKEN }}" \
            -d "$JSON"
