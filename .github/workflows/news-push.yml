name: News Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        
      - name: Send to WhatsApp
        run: |
          # 获取提交信息（去掉换行和引号）
          RAW_MSG='${{ github.event.head_commit.message }}'
          MSG=$(echo "$RAW_MSG" | tr '\n' ' ' | sed 's/"/\\\"/g')
          
          REPO='${{ github.repository }}'
          ACTOR='${{ github.actor }}'
          
          # 构建 JSON
          JSON="{\"channel\":\"whatsapp\",\"target\":\"+8613963767577\",\"message\":\"🚀 GitHub更新\n仓库: $REPO\n提交者: $ACTOR\n信息: $MSG\n🤓来自你的小弟\"}"
          
          echo "Sending: $JSON"
          
          curl -X POST "https://gh.mxaly.top:16666/api/message" \
            -H "Content-Type: application/json" \
            -d "$JSON"
