name: News Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Send to WhatsApp
        run: |
          MSG=$(echo '${{ github.event.head_commit.message }}' | jq -Rs .)
          REPO='${{ github.repository }}'
          ACTOR='${{ github.actor }}'
          
          JSON=$(jq -n \
            --arg ch "whatsapp" \
            --arg tg "+8613963767577" \
            --arg msg "🚀 GitHub更新\n仓库: $REPO\n提交者: $ACTOR\n信息: $MSG" \
            '{channel: $ch, target: $tg, message: $msg}')
          
          curl -X POST "https://gh.mxaly.top:16666/api/message" \
            -H "Content-Type: application/json" \
            -d "$JSON"
