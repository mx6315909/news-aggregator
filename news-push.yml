name: News Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Send to WhatsApp
      run: |
        curl -X POST "https://gh.mxaly.top:18789/api/message" \
          -H "Content-Type: application/json" \
          -d '{"channel":"whatsapp","target":"+8613963767577","message":"🚀 GitHub更新\n仓库:${{ github.repository }}\n提交者:${{ github.actor }}\n信息:${{ github.event.head_commit.message }}\n🤓来自你的小弟"}'
